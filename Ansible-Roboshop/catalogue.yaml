- name: setup catalogue 
  hosts: catalogue
  become: yes

  tasks:
  # pip3.9 install pymongo
  - name: Disable default nodejs module
    command: dnf module disable nodejs -y

  - name: Enable Nodejs module
    command: dnf module enable nodejs:20 -y 

  - name: install nodejs
    ansible.builtin.package:
        name: nodejs
        state: present

  - name: Creating  application user roboshop
    ansible.builtin.user:
      name: roboshop
      comment: Roboshop User
      system: true
      shell: /sbin/nologin
      home: /app

  - name: Create a directory if it does not exist
    ansible.builtin.file:
      path: /app 
      state: directory
  
  - name: Download catalogue application
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip
  
  - name: extract catalogue application  
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: Install packages based on package.json.
    community.general.npm:
      path: /app
  
  - name: copy catalogue service
    ansible.builtin.copy:
       src: catalogue.service
       dest: /etc/systemd/system/catalogue.service

  - name: copy mongodb repo
    ansible.builtin.copy:
       src: mongo.repo
       dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb 
    ansible.builtin.package: 
      name: mongodb-mongosh
      state: present
  
  # to check whether the catalogue database exists in MongoDB or not.
  - name: connnect to mongodb catalogue
    ansible.builtin.command: mongosh mongodb.cloudskills.fun --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
    register: catalogue_output

  # -1	database does not exist 0 or positive	database exists
  # load the product data into MongoDB only if the catalogue database does not exist
  - name: Load catalogue data into MongoDB
  # command effectively creates the catalogue database and inserts product data if it doesn't already exist.
    ansible.builtin.shell: mongosh --host mongodb.cloudskills.fun </app/db/master-data.js
    when: catalogue_output.stdout | int < 0
  
  # - name: start and enable cataalogue
  #   ansible.builtin.service:
  #     name: catalogue
  #     enabled: yes
  #     state: started
  
  - name: daemon reload enable and start
    ansible.builtin.systemd_service:
      name: catalogue
      enabled: true
      state: started
      daemon_reload: true